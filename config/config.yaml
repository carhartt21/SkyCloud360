DATASET:
  root_dataset: "/media/chge7185/HDD1/datasets/outdoor_estimation/"
  list_val: "./data/cloud_seg_small.odgt"
  imgSizes: (400, 500, 600, 700)
  imgMaxSize: 1000
  num_attr_class: (4, 4, 4)
  num_seg_class: 2
  num_cloud_class: 2
  padding_constant: 32
  segm_downsampling_rate: 1
  random_flip: True
  random_crop: False
  classInfo: "./data/labels.json"

MODEL:
  arch_encoder: "resnet50"
  fc_dim: 2048
  # 360° adaptation mode: 'none', 'cm', 'ecm', 'tpp', 'eqc'
  equirect_mode: "none"
  # cubemap face resolution (CM/ECM)
  cubemap_face_size: 256
  # overlap fraction for extended cubemap (ECM)
  ecm_overlap: 0.1
  # tangent plane projection settings (TPP)
  tpp_patch_size: 256
  tpp_fov_deg: 60.0
  tpp_num_lat: 4
  tpp_num_lon: 8
  # equirectangular convolution settings (EQC)
  eqc_replace_encoder: True
  eqc_replace_decoder: True

VAL:
  visualize: False
  checkpoint: "epoch_40.pth"
  sky_seg: False
  cloud_seg: True

TEST:
  checkpoint: "epoch_20.pth"
  result: "./test/"

DIR: "weights/"
